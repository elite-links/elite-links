<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Linktree</title>

<link rel="stylesheet" href="style.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Theme Button -->
    <button id="themeToggle" class="theme-btn" aria-label="Toggle theme">
        <i class="fa-solid fa-moon"></i>
    </button>

    <!-- Profile -->
    <div class="profile">
        <img src="https://i.pravatar.cc/200" alt="Profile picture">
        <h2>@yourname</h2>

        <div class="socials">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </div>

    <!-- Links -->
    <div class="links">
        <a class="link" href="#">About Me</a>
        <a class="link" href="#">My Website</a>
        <a class="link" href="#">Shop</a>
        <a class="link" href="#">Portfolio</a>
        <a class="link" href="#">Contact</a>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
