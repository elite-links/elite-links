<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Linktree</title>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* BODY */
body{
    background:#0f0f0f;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    transition:0.3s;
}

/* LIGHT MODE */
body.light{
    background:#f4f4f4;
    color:#111;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:400px;
    text-align:center;
    margin-top:40px;
}

/* THEME BUTTON */
.theme-btn{
    position:absolute;
    right:20px;
    top:20px;
    border:none;
    background:#222;
    color:white;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

body.light .theme-btn{
    background:#ddd;
    color:#111;
}

/* PROFILE */
.profile img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin-bottom:15px;
}

.profile h2{
    margin-bottom:10px;
}

/* SOCIALS */
.socials a{
    margin:0 10px;
    color:inherit;
    font-size:22px;
    transition:0.3s;
}

.socials a:hover{
    transform:scale(1.2);
}

/* LINKS */
.links{
    margin-top:25px;
}

.link{
    display:block;
    background:#1e1e1e;
    margin:12px 0;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.link:hover{
    transform:translateY(-3px);
    background:#333;
}

body.light .link{
    background:white;
    color:#111;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    width:100%;
    background:#111;
    color:white;
}

body.light footer{
    background:#ddd;
    color:#111;
}

</style>
</head>

<body>

<div class="container">

    <!-- Theme Button -->
    <button id="themeToggle" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
    </button>

    <!-- Profile -->
    <div class="profile">
        <img src="https://i.pravatar.cc/200" alt="Profile picture">
        <h2>@yourname</h2>

        <div class="socials">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-tiktok"></i></a>
            <a href="#"><i class="fa-brands fa-youtube"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
        </div>
    </div>

    <!-- Links -->
    <div class="links">
        <a class="link" href="#">About Me</a>
        <a class="link" href="#">My Website</a>
        <a class="link" href="#">Shop</a>
        <a class="link" href="#">Portfolio</a>
        <a class="link" href="#">Contact</a>
    </div>

</div>

<footer>
© 2026 Elite Links | Created by Sulaiman
</footer>

<script>

/* THEME TOGGLE */
const toggleBtn = document.getElementById("themeToggle");

toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");

    const icon = toggleBtn.querySelector("i");
    icon.classList.toggle("fa-moon");
    icon.classList.toggle("fa-sun");
});

</script>

</body>
</html>
