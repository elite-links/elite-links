<!DOCTYPE html>
<html>
<head>
<title>Create Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

<h2>Create Your Elite Profile</h2>

<form id="profileForm">

<input name="username" placeholder="Username" required>

<input name="facebook" placeholder="Facebook Link">
<input name="instagram" placeholder="Instagram Link">
<input name="tiktok" placeholder="TikTok Link">
<input name="youtube" placeholder="YouTube Link">

<input name="shop" placeholder="Shop Link">
<input name="website" placeholder="Website">

<textarea name="about" placeholder="About Me"></textarea>

<button type="submit">Save Profile</button>

</form>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
  window.location="login.html";
}

document.getElementById("profileForm")
.addEventListener("submit", async(e)=>{

e.preventDefault();

const data = Object.fromEntries(
  new FormData(e.target)
);

const res = await fetch("/api/profile",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify(data)
});

if(res.ok){
alert("Profile created!");
window.location="dashboard.html";
}else{
alert("Error creating profile");
}

});

</script>

</body>
</html>
