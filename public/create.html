<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Profile</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h2{
text-align:center;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:12px;
border:none;
border-radius:6px;
outline:none;
font-size:14px;
}

textarea{
resize:none;
height:80px;
}

button{
width:100%;
padding:12px;
border:none;
background:#3b82f6;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}
</style>

</head>

<body>

<div class="box">

<h2>Create Your Elite Profile</h2>

<form id="profileForm">

<input name="username" placeholder="Username" required>

<input name="facebook" placeholder="Facebook Link">
<input name="instagram" placeholder="Instagram Link">
<input name="tiktok" placeholder="TikTok Link">
<input name="youtube" placeholder="YouTube Link">

<input name="shop" placeholder="Shop Link">
<input name="website" placeholder="Website">

<textarea name="about" placeholder="About Me"></textarea>

<button type="submit">Save Profile</button>

</form>

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

document.getElementById("profileForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  try {

    const res = await fetch("/api/profile", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert("Profile created!");
      window.location.href = "dashboard.html";
    } else {
      const err = await res.text();
      alert("Error creating profile: " + err);
    }

  } catch (error) {
    alert("Network error");
    console.error(error);
  }

});

</script>

</body>
</html>
