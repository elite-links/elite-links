<!DOCTYPE html>
<html>
<head>
  <title>Create Profile</title>
</head>

<body>

<h2>Create Your Elite Profile</h2>

<form id="profileForm">

<input type="text" name="username" placeholder="Username" required><br><br>

<input type="text" name="facebook" placeholder="Facebook Link"><br>
<input type="text" name="instagram" placeholder="Instagram Link"><br>
<input type="text" name="tiktok" placeholder="TikTok Link"><br>
<input type="text" name="youtube" placeholder="YouTube Link"><br>

<input type="text" name="shop" placeholder="Shop Link"><br>
<input type="text" name="website" placeholder="Website"><br>

<textarea name="about" placeholder="About Me"></textarea><br><br>

<button type="submit">Save Profile</button>

</form>

<script>

// check login token
const token = localStorage.getItem("token");

if (!token) {
  window.location = "login.html";
}

// form submit
document.getElementById("profileForm")
.addEventListener("submit", async (e) => {

  e.preventDefault();

  const data = Object.fromEntries(
    new FormData(e.target)
  );

  try {

    const res = await fetch("/create-profile", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": token
      },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      alert("Profile created!");
      window.location = "dashboard.html";
    } else {
      const msg = await res.text();
      alert("Error: " + msg);
    }

  } catch (err) {
    alert("Server connection error");
  }

});

</script>

</body>
</html>
