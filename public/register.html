<!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

  <h2>Create Account</h2>

  <form id="registerForm">

    <input name="name" placeholder="Username" required>

    <input name="email" type="email" placeholder="Email" required>

    <input name="password" type="password" placeholder="Password" required>

    <button type="submit">Register</button>

  </form>

  <p style="margin-top:15px;">
    Already have an account?
    <a href="login.html">Login</a>
  </p>

</div>

<footer style="text-align:center; padding:20px; margin-top:40px; background:#111; color:white;">
  © 2026 Elite Links | Created by Sulaiman
</footer>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  try {
    const res = await fetch("/auth/register", {   // <-- fixed URL to match backend
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok){
      alert("Account Created");
      window.location = "/login.html";
    } else {
      alert(result.error || "Registration failed");
    }

  } catch(err){
    alert("Server error");
    console.error(err);
  }

});
</script>

</body>
</html>
