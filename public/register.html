<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #fff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }
    .box h2 {
      margin-bottom: 20px;
    }
    .box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .box input.valid {
      border-color: green;
    }
    .box input.invalid {
      border-color: red;
    }
    .box button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    .box button:hover {
      background: #333;
    }
    .box p {
      margin-top: 15px;
      font-size: 14px;
    }
    .box a {
      color: #111;
      text-decoration: none;
      font-weight: bold;
    }
    .strength {
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 8px;
      text-align: left;
    }
    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      background: #111;
      color: white;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Create Account</h2>

  <form id="registerForm">
    <input id="username" name="username" type="text" placeholder="Username" required>
    <input id="email" name="email" type="email" placeholder="Email" required>
    <input id="password" name="password" type="password" placeholder="Password" required>
    <div id="strengthText" class="strength"></div>
    <button type="submit">Register</button>
  </form>

  <p>
    Already have an account? <a href="login.html">Login</a>
  </p>
</div>

<footer>
  © 2026 Elite Links | Created by Sulaiman
</footer>

<script>
const usernameInput = document.getElementById("username");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const strengthText = document.getElementById("strengthText");

// Helper functions
function validateEmail(email) {
  const re = /^[\\w-\\.]+@([\\w-]+\\.)+[\\w-]{2,4}$/;
  return re.test(email);
}

function passwordStrength(password) {
  let strength = 0;
  if(password.length >= 8) strength++;
  if(/[A-Z]/.test(password)) strength++;
  if(/[a-z]/.test(password)) strength++;
  if(/[0-9]/.test(password)) strength++;
  if(/[^A-Za-z0-9]/.test(password)) strength++;

  if(strength <= 2) return {text: "Weak", color: "red"};
  if(strength === 3) return {text: "Medium", color: "orange"};
  if(strength >= 4) return {text: "Strong", color: "green"};
}

// Real-time validation
usernameInput.addEventListener("input", () => {
  if(usernameInput.value.length >= 3){
    usernameInput.classList.add("valid");
    usernameInput.classList.remove("invalid");
  } else {
    usernameInput.classList.add("invalid");
    usernameInput.classList.remove("valid");
  }
});

emailInput.addEventListener("input", () => {
  if(validateEmail(emailInput.value)){
    emailInput.classList.add("valid");
    emailInput.classList.remove("invalid");
  } else {
    emailInput.classList.add("invalid");
    emailInput.classList.remove("valid");
  }
});

passwordInput.addEventListener("input", () => {
  const strength = passwordStrength(passwordInput.value);
  strengthText.textContent = `Password strength: ${strength.text}`;
  strengthText.style.color = strength.color;

  if(strength.text === "Weak") {
    passwordInput.classList.add("invalid");
    passwordInput.classList.remove("valid");
  } else {
    passwordInput.classList.add("valid");
    passwordInput.classList.remove("invalid");
  }
});

// Form submission
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));

  // final validation before submission
  if(usernameInput.value.length < 3){
    alert("Username must be at least 3 characters");
    return;
  }
  if(!validateEmail(emailInput.value)){
    alert("Invalid email address");
    return;
  }
  if(passwordStrength(passwordInput.value).text === "Weak"){
    alert("Password is too weak");
    return;
  }

  try {
    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok){
      alert("Account Created Successfully!");
      window.location.href = "/login.html";
    } else {
      alert(result.error || "Registration failed");
    }

  } catch(err){
    alert("Server error");
    console.error(err);
  }
});
</script>

</body>
</html>
