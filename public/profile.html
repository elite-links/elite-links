<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Profile</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:600px;
  margin:60px auto;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
  margin-bottom:20px;
}

.link{
  display:block;
  padding:10px;
  margin:8px 0;
  background:#f0f0f0;
  border-radius:6px;
  text-decoration:none;
  color:#333;
  transition:0.2s;
}

.link:hover{
  background:#e4e4e4;
}
</style>

</head>

<body>

<div class="container">

<h1 id="username">Loading...</h1>

<div id="links"></div>

</div>

<script>

const username = window.location.pathname.split("/").pop();

async function loadProfile(){

try{

const res = await fetch("/api/profile/" + encodeURIComponent(username));

if(!res.ok){
throw new Error("Profile not found");
}

const data = await res.json();

document.getElementById("username").textContent = data.username;

const links = document.getElementById("links");
links.innerHTML = "";

for(const key in data){

if(data[key] && key !== "_id" && key !== "username"){

const a = document.createElement("a");
a.className = "link";
a.href = data[key];
a.target = "_blank";
a.textContent = key;

links.appendChild(a);

}

}

}catch(err){

document.getElementById("username").textContent = "User not found";
console.error(err);

}

}

loadProfile();

</script>

</body>
</html>
