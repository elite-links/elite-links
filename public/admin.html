<!DOCTYPE html>
<html>
<head>
<title>Elite Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h1>Elite Admin Panel</h1>

<button onclick="loadUsers()">Show Members</button>

<table>

<thead>
<tr>
<th>Email</th>
<th>Role</th>
</tr>
</thead>

<tbody id="users"></tbody>

</table>

</div>

<script>

async function loadUsers(){

const token = localStorage.getItem("token");

if(!token){
window.location="login.html";
}

const res = await fetch("/api/users",{
headers:{
"Authorization":"Bearer "+token
}
});

if(!res.ok){
alert("Admin only");
return;
}

const users = await res.json();

const table = document.getElementById("users");

table.innerHTML="";

users.forEach(u=>{

table.innerHTML += `
<tr>
<td>${u.email}</td>
<td>${u.role}</td>
</tr>
`;

});

}

</script>

</body>
</html>
